animations {
    enabled = yes

    bezier = harmony, 0.2, 0.9, 0.2, 1.0

    animation = windows, 1, 3, harmony, popin 85%
    animation = windowsIn, 1, 3, harmony, popin 85%
    animation = windowsOut, 1, 3, harmony, popin 85%

    animation = workspaces, 1, 2, harmony, slidefade 25%
    animation = workspacesIn, 1, 2, harmony, slidefade 25%
    animation = workspacesOut, 1, 2, harmony, slidefade 25%

    animation = fade, 1, 2, harmony
    animation = fadeIn, 1, 2, harmony
    animation = fadeOut, 1, 2, harmony
}
