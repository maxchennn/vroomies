# Core Services
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start xdg-desktop-portal
exec-once = nm-applet --indicator & blueman-applet & swaync

# Wallpaper & UI
exec-once = awww-daemon
exec-once = sleep 1 && awww img ~/.config/hypr/walls/current_wallpaper --transition-type fade --transition-duration 1.5
exec-once = sleep 2 && QML_XHR_ALLOW_FILE_READ=1 quickshell --path ~/.config/quickshell/shell.qml
exec-once = $scripts /hyprpm.sh


# Cursor & Theme Fixes
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = hyprctl keyword cursor:no_hardware_cursors 0
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Ice
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface gtk-decoration-layout ":"

# for hyprland
exec-once = bash  ~.connfig/hypr/scripts/hyprpm.sh
