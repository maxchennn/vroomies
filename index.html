<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroomies | Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar container">
        <div class="nav-brand">
            <div class="brand-dot"></div>
            VROOMIES
        </div>
        <a href="https://github.com/maxchennn" class="btn-github" target="_blank">maxchennn</a>
    </nav>

    <main class="container">
        <section class="hero-showcase">
            <img src="gallery/Hero.png" alt="Vroomies Hero" class="main-preview">
            <div class="hero-text">
                <h1>The <span class="gradient-text">Vroomies</span> Experience</h1>
                <p>A minimalist desktop environment focused on speed and aesthetics.</p>
            </div>
        </section>

        <section class="gallery-grid">
            <div class="gallery-item">
                <img src="gallery/launcher.png" alt="Launcher">
                <div class="item-info">
                    <h3>Dynamic Launcher</h3>
                    <p>Fluid UI for your applications.</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="gallery/wallpaper-switcher.png" alt="Wallpaper Switcher">
                <div class="item-info">
                    <h3>Palette Flow</h3>
                    <p>Colors that match your style.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="container">
        <p>&copy; 2026 Developed by maxchennn</p>
    </footer>

</body>
</html>
