<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroomies | Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="fade-in">

    <nav class="navbar container">
        <div class="nav-brand slide-down">
            <div class="brand-dot"></div>
            VROOMIES
        </div>
        <div class="nav-controls slide-down">
            <button id="theme-toggle" class="theme-btn">
                <span class="mode-icon"></span>
            </button>
            <a href="https://github.com/maxchennn" class="btn-github" target="_blank">maxchennn</a>
        </div>
    </nav>

    <main class="container">
        <section class="hero-showcase reveal">
            <div class="slider-container">
                <button class="slider-arrow prev" onclick="changeSlide(-1)">&#10094;</button>
                <div class="slider-wrapper">
                    <img src="gallery/Hero.png" class="slide active" alt="Hero">
                    <img src="gallery/launcher.png" class="slide" alt="Launcher">
                    <img src="gallery/wallpaper-switcher.png" class="slide" alt="Switcher">
                </div>
                <button class="slider-arrow next" onclick="changeSlide(1)">&#10095;</button>
            </div>
            
            <div class="hero-text">
                <h1>The <span class="gradient-text">Vroomies</span> Experience</h1>
                <p>A minimalist desktop environment focused on speed and aesthetics.</p>
            </div>
        </section>

        <section class="install-section reveal">
            <h2>Quick Installation</h2>
            <div class="code-block">
                <code id="install-cmd">curl -sSL https://raw.githubusercontent.com/maxchennn/vroomies/main/install.sh | bash</code>
                <button class="copy-btn" onclick="copyCode()">Copy</button>
            </div>
        </section>
    </main>

    <footer class="container reveal">
        <p>&copy; 2026 Developed by maxchennn</p>
    </footer>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function changeSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'light-mode') {
            body.classList.add('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light-mode' : '');
        });

        function copyCode() {
            const code = document.getElementById('install-cmd').innerText;
            navigator.clipboard.writeText(code);
            alert("Copied!");
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
