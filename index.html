<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>vroomies 🌊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  :root {
    --bg-primary: #0a0a1a;
    --bg-gradient: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2a0a4e 100%);
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);
    --neon-cyan: #00f5ff;
    --neon-purple: #aa00ff;
    --neon-pink: #ff00ff;
    --text-main: #e0e7ff;
    --text-secondary: #a0b2ff;
    --text-muted: #6474ff;
    --accent-glow: rgba(0, 245, 255, 0.5);
  }

  * { scrollbar-width: thin; scrollbar-color: var(--neon-cyan) transparent; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 4px; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* PARTICLE BACKGROUND */
  .particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
  }

  .particle {
    position: absolute;
    background: var(--neon-cyan);
    border-radius: 50%;
    animation: float 20s infinite linear;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  /* NEON GLOW ANIMATIONS */
  @keyframes neonPulse {
    0%, 100% { text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
    50% { text-shadow: 0 0 20px var(--neon-purple), 0 0 30px var(--neon-purple), 0 0 40px var(--neon-purple); }
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  @keyframes matrixRain {
    0% { background-position: 0% 100%; }
    100% { background-position: 0% -100%; }
  }

  /* NAV - GLASSMORPHISM */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid var(--glass-border);
    padding: 1rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: neonPulse 2s ease-in-out infinite;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    position: relative;
    transition: all 0.3s ease;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    transition: width 0.3s ease;
  }

  .nav-links a:hover::after {
    width: 100%;
  }

  .nav-links a:hover {
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
  }

  /* HERO SECTION */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 10;
  }

  .hero-badge {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    color: var(--neon-cyan);
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 0.5rem 1.5rem;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    margin-bottom: 2rem;
    letter-spacing: 0.2em;
    animation: glitch 2s infinite;
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(4rem, 12vw, 9rem);
    font-weight: 900;
    line-height: 0.9;
    margin-bottom: 1.5rem;
    background: linear-gradient(45deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: neonPulse 3s ease-in-out infinite;
  }

  .hero p {
    font-size: 1.3rem;
    color: var(--text-secondary);
    max-width: 600px;
    line-height: 1.8;
    margin-bottom: 3rem;
    text-shadow: 0 0 20px rgba(0,245,255,0.3);
  }

  .hero-buttons {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 1rem 2.5rem;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 50px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 2px solid transparent;
  }

  .btn-primary {
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
    color: #000;
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 20px 40px rgba(0,245,255,0.4);
  }

  .btn-secondary {
    background: var(--glass);
    backdrop-filter: blur(20px);
    color: var(--text-main);
    border: 2px solid var(--glass-border);
  }

  .btn-secondary:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 30px var(--accent-glow);
    transform: translateY(-5px);
  }

  /* SECTIONS */
  section {
    padding: 8rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  .section-header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: var(--neon-pink);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    animation: scanline 2s infinite;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* SHOWCASE */
  .showcase-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 2rem;
  }

  .showcase-item {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .showcase-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(45deg, transparent, var(--accent-glow), transparent);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .showcase-item:hover::before {
    opacity: 1;
  }

  .showcase-item:hover {
    transform: translateY(-20px) rotateX(5deg);
    border-color: var(--neon-cyan);
    box-shadow: 0 30px 60px rgba(0,245,255,0.3);
  }

  .showcase-img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .showcase-item:hover .showcase-img {
    transform: scale(1.1);
  }

  .showcase-placeholder {
    height: 250px;
    background: rgba(0,245,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  /* STACK */
  .stack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .stack-item {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .stack-item::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    transition: left 0.5s ease;
  }

  .stack-item:hover::before {
    left: 100%;
  }

  .stack-item:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow: 0 20px 40px rgba(0,245,255,0.2);
  }

  .stack-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
    color: #000;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .stack-item:hover .stack-icon {
    transform: rotate(360deg) scale(1.1);
  }

  .stack-info h3 {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    margin-bottom: 0.25rem;
    color: var(--text-main);
  }

  .stack-info p {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* KEYBINDS */
  .keybinds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 1rem;
  }

  .keybind-item {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
  }

  .keybind-item:hover {
    border-color: var(--neon-pink);
    transform: scale(1.02);
    box-shadow: 0 15px 30px rgba(255,0,255,0.2);
  }

  .keybind-text h4 {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    margin-bottom: 0.25rem;
    color: var(--neon-cyan);
  }

  .keybind-text p {
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .keybind-keys {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .key {
    background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
    color: #000;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(170,0,255,0.5);
  }

  .keybind-item:hover .key {
    box-shadow: 0 0 25px rgba(255,0,255,0.8);
    transform: scale(1.1);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--glass-border);
    padding: 3rem 2rem;
    text-align: center;
    color: var(--text-muted);
    font-family: 'Orbitron', monospace;
  }

  footer a {
    color: var(--neon-cyan);
    text-decoration: none;
    transition: all 0.3s ease;
  }

  footer a:hover {
    text-shadow: 0 0 15px var(--neon-cyan);
    transform: scale(1.05);
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
    max-width: 800px;
    margin: 0 auto 4rem;
    border-radius: 1px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1.5rem; font-size: 0.9rem; }
    .hero-buttons { flex-direction: column; align-items: center; }
    .keybinds-grid { grid-template-columns: 1fr; }
    .showcase-grid { grid-template-columns: 1fr; }
  }

  /* LOADING ANIMATION */
  .loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  .loading.hidden { opacity: 0; pointer-events: none; }

  .loader {
    width: 60px;
    height: 60px;
    border: 4px solid var(--glass);
    border-top: 4px solid var(--neon-cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% {
