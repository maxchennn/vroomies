source = $HOME/.config/hypr/colors.conf

# BACKGROUND
background {
    monitor =
    path = $image
    blur_passes = 2
    blur_size = 4
    contrast = 1.0
    brightness = 0.6
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
    hide_cursor = true
}

# INPUT FIELD (Modern & Minimal)
input-field {
    monitor =
    size = 280, 55 # Japonca karakterler için genişliği biraz artırdım
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = $primary
    inner_color = $surface_container_lowest
    font_color = $on_surface
    fade_on_empty = false
    rounding = 15
    check_color = $tertiary
    fail_color = $error
    # Japonca karakterlerin düzgün görünmesi için font ekledim
    placeholder_text = <span font_family="JetBrainsMono Nerd Font, Noto Sans CJK JP">限界を超えろ。</span>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

# TIME (Büyük ve Estetik)
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 120
    halign = center
    valign = center
}

# DATE (Günün tarihi)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $on_surface_variant
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# USERNAME (Input field üzerinde şık bir karşılama)
label {
    monitor =
    text = Hello, $USER
    color = $on_surface
    font_size = 20
    font_family = VT323, Pixeloid Sans, Monocraft
    position = 0, -35
    halign = center
    valign = center
}

# IMAGE (Profil fotoğrafın - .face.icon varsa)
image {
    monitor =
    path = $HOME/.face.icon
    size = 100
    rounding = -1 # Tam yuvarlak
    border_size = 2
    border_color = $primary
    position = 0, 230
    halign = center
    valign = center
}
