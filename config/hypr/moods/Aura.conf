general {
    gaps_in = 3
    gaps_out = 15
    border_size = 1
    col.active_border = $primary $surface_bright 45deg
    col.inactive_border = $surface_container
    layout = master 
    resize_on_border = true
}

decoration {
    rounding = 20
    blur {
        enabled = true
        size = 12
        passes = 4
        vibrancy = 0.2
        noise = 0.005
        contrast = 0.9
        popups = true
    }

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(00000066)
    }
}

layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = ignorealpha 0.5, waybar
layerrule = xray 1, waybar
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-box
layerrule = ignorezero, swaync-control-center
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = blur, rofi
layerrule = ignorezero, rofi

master {
    mfact = 0.50
    orientation = center
    inherit_fullscreen = true
    # always_center_master hatası için yeni karşılığı:
    special_scale_factor = 0.8
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vrr = 1
}
